name: npm Publish

on:
    push:
        branches: [main]
    release:
        types: [published]

permissions:
    contents: read

jobs:
    build-dev:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24.15.0
                  package-manager-cache: false
            - run: corepack enable
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - uses: actions/upload-artifact@v7
              with:
                  name: build-output
                  path: dist
                  if-no-files-found: error

    publish-dev:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        needs: build-dev
        runs-on: ubuntu-latest
        permissions:
            contents: read
            # Necessary for OIDC permissions for trusted publishing. Keep this isolated from dependency installation and build scripts.
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24.15.0
                  # More info: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages#publishing-packages-to-the-npm-registry
                  registry-url: 'https://registry.npmjs.org'
                  package-manager-cache: false
            - uses: actions/download-artifact@v7
              with:
                  name: build-output
                  path: dist
            - name: Set dev package version
              run: |
                  node --input-type=module <<'EOF'
                  import fs from 'node:fs'

                  const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
                  packageJson.version = `${packageJson.version}-dev.${process.env.GITHUB_SHA}`
                  fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 4)}\n`)
                  EOF
            - run: npm publish --access public --tag dev --ignore-scripts

    build-prod:
        if: github.event_name == 'release' && github.event.action == 'published'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24.15.0
                  package-manager-cache: false
            - run: corepack enable
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint
            - run: pnpm test
            - run: pnpm build
            - run: pnpm test:exports
            - uses: actions/upload-artifact@v7
              with:
                  name: build-output
                  path: dist
                  if-no-files-found: error

    publish-prod:
        if: github.event_name == 'release' && github.event.action == 'published'
        needs: build-prod
        runs-on: ubuntu-latest
        permissions:
            contents: read
            # Necessary for OIDC permissions for trusted publishing. Keep this isolated from dependency installation and build scripts.
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24.15.0
                  # More info: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages#publishing-packages-to-the-npm-registry
                  registry-url: 'https://registry.npmjs.org'
                  package-manager-cache: false
            - uses: actions/download-artifact@v7
              with:
                  name: build-output
                  path: dist
            - run: npm publish --ignore-scripts
