name: Benchmark

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    benchmark:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24.18.0
            - run: corepack enable
            - run: pnpm install --frozen-lockfile
            - name: Run benchmark
              # Pinned from CodSpeedHQ/action@v4.15.1.
              uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd
              with:
                  # This public repository uses CodSpeed tokenless uploads so PR benchmark code does not receive a long-lived upload token or OIDC permission.
                  mode: simulation
                  run: pnpm bench
