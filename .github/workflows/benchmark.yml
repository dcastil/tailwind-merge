name: Benchmark

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    benchmark:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24.15.0
            - name: Use node_modules cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: yarn-node-24-lock-${{ hashFiles('yarn.lock') }}
                  restore-keys: |
                      yarn-node-24-lock-
            - run: yarn install --frozen-lockfile
            - name: Run benchmark
              # Pinned from CodSpeedHQ/action@v4.15.1.
              uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd
              with:
                  token: ${{ secrets.CODSPEED_TOKEN }}
                  mode: simulation
                  run: yarn bench
