name: Draft Release

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]

jobs:
    update_release_draft:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            # Pinned from release-drafter/release-drafter@v7.3.0.
            - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927
              with:
                  token: ${{ github.token }}

    auto_label:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            # Pinned from release-drafter/release-drafter@v7.3.0.
            - uses: release-drafter/release-drafter/autolabeler@c2e2804cc59f45f57076a99af580d0fedb697927
              with:
                  token: ${{ github.token }}
